# =============================================================================
# Agent Performance Testing - Setup Configuration
# =============================================================================
# Edit this file before running any tasks.
# All paths are relative to this file's directory unless absolute.

# Path to the unzipped repo on the orchestrator machine
repo_path: "/opt/agent_perf_testing"

# Input files (relative to this file or absolute)
servers_file: "servers.csv"
credentials_file: "mycred.txt"

# vSphere connection
vsphere:
  host: "vcenter.example.com"
  port: 443

# PostgreSQL - will be created on the orchestrator machine
postgres:
  host: "localhost"
  port: 5432
  db_name: "orchestrator"
  db_user: "orchestrator"
  db_password: "orchestrator"

# Lab configuration
lab:
  name: "vsphere_lab"
  description: "vSphere-based performance testing lab"

# Service account to create on all machines
service_account:
  # Name of the account (must match 'serviceaccount' entry in mycred.txt)
  create_ssh_key: true

# Load profiles (standard defaults)
load_profiles:
  - name: "low"
    target_cpu_min: 20
    target_cpu_max: 40
    duration_sec: 3600
    ramp_up_sec: 30
  - name: "medium"
    target_cpu_min: 40
    target_cpu_max: 60
    duration_sec: 3600
    ramp_up_sec: 60
  - name: "high"
    target_cpu_min: 60
    target_cpu_max: 80
    duration_sec: 3600
    ramp_up_sec: 60

# Output files (generated by tasks)
output:
  discovery_file: "discovery_output.json"
  credentials_json: "credentials.json"
