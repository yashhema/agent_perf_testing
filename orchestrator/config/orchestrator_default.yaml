# Default configuration template for the orchestrator.
# Copy this file to orchestrator.yaml and fill in your environment-specific values.
#
#   cp orchestrator_default.yaml orchestrator.yaml

calibration:
  observation_duration_sec: 180
  observation_reading_count: 120
  calibration_stability_ratio: 0.5
  calibration_confirmation_count: 2
  max_calibration_iterations: 50
  max_thread_count: 50
  first_observation_settle_sec: 300  # 5-min JVM settle before first calibration reading
  bracket_settle_sec: 30  # settle time for every bracket observation (post-revert warmup)
  # Stability check pass criteria:
  #   min_in_range_pct: minimum % of samples that must fall within target CPU range
  #   max_below_pct: maximum % of samples allowed below the target minimum
  stability_min_in_range_pct: 55.0
  stability_max_below_pct: 25.0

infrastructure:
  snapshot_restore_timeout_sec: 600
  skip_snapshot_restore: true
  post_restore_verification_enabled: true
  post_restore_verification_commands:
    linux: "uptime"
    windows: "systeminfo"

stats:
  collect_interval_sec: 5
  stats_trim_start_sec: 300  # 5-min trim: skip JVM warmup (heap alloc, JIT, GC)
  stats_trim_end_sec: 10
  jtl_min_success_rate_pct: 95.0  # Fail the run if JMeter success rate drops below this

barrier:
  barrier_timeout_margin_percent: 0.20

emulator:
  emulator_api_port: 8080

# Database: supports both PostgreSQL and SQL Server
# PostgreSQL:           postgresql://user:pass@host:5432/dbname
# SQL Server:           mssql+pyodbc://user:pass@host/dbname?driver=ODBC+Driver+17+for+SQL+Server
# SQL Server (trusted): mssql+pyodbc://@host/dbname?driver=ODBC+Driver+17+for+SQL+Server&trusted_connection=yes
database:
  url: "postgresql://orchestrator:orchestrator@localhost:5432/orchestrator"
  echo: false

credentials_path: "config/credentials.json"
artifacts_dir: "artifacts"
generated_dir: "generated"
results_dir: "results"
