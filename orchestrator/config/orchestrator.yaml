calibration:
  observation_duration_sec: 30
  # Use last 20 of ~30 samples (skip first 10s settling time).
  # Previous value of 5 caused noisy readings (50 threads > 100 threads in run 1).
  observation_reading_count: 20
  calibration_stability_ratio: 0.5
  calibration_confirmation_count: 2
  max_calibration_iterations: 50
  # Upper bound for binary search. Previous value of 200 wasted iterations —
  # on a 4-core VM, anything above ~6 threads already maxes CPU.
  max_thread_count: 30
  # Stability check pass criteria:
  #   min_in_range_pct: minimum % of samples that must fall within target CPU range
  #   max_below_pct: maximum % of samples allowed below the target minimum
  #   (above-max spikes are tolerable — means we're generating enough load)
  stability_min_in_range_pct: 55.0
  stability_max_below_pct: 10.0

infrastructure:
  snapshot_restore_timeout_sec: 600
  skip_snapshot_restore: true
  post_restore_verification_enabled: true
  post_restore_verification_commands:
    linux: "uptime"
    windows: "systeminfo"

stats:
  collect_interval_sec: 5
  stats_trim_start_sec: 30
  stats_trim_end_sec: 10

barrier:
  barrier_timeout_margin_percent: 0.20

emulator:
  emulator_api_port: 8080

# Database: supports both PostgreSQL and SQL Server
# PostgreSQL:        postgresql://orchestrator:orchestrator@localhost:5432/orchestrator
# SQL Server:        mssql+pyodbc://user:pass@host/orchestrator?driver=ODBC+Driver+17+for+SQL+Server
# SQL Server (trusted): mssql+pyodbc://@localhost/orchestrator?driver=ODBC+Driver+17+for+SQL+Server&trusted_connection=yes
database:
  url: "mssql+pyodbc://@localhost/orchestrator?driver=ODBC+Driver+17+for+SQL+Server&trusted_connection=yes"
  echo: false

credentials_path: "config/credentials.json"
artifacts_dir: "artifacts"
generated_dir: "generated"
results_dir: "results"
