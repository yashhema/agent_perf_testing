version: "3.9"

# Docker Compose for E2E Testing
# Creates:
# - PostgreSQL database
# - 2 emulator containers (simulating target servers)
# - 1 loadgen container (JMeter)
#
# Usage:
#   docker-compose -f tests/e2e/docker/docker-compose.yml up -d
#   pytest tests/e2e/ --e2e-docker
#   docker-compose -f tests/e2e/docker/docker-compose.yml down

networks:
  e2e-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

services:
  # PostgreSQL database for E2E tests
  postgres:
    image: postgres:15-alpine
    container_name: e2e-postgres
    environment:
      POSTGRES_USER: e2e_user
      POSTGRES_PASSWORD: e2e_password
      POSTGRES_DB: agent_perf_e2e
    ports:
      - "5434:5432"
    networks:
      e2e-network:
        ipv4_address: 172.30.0.5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e_user -d agent_perf_e2e"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-e2e-data:/var/lib/postgresql/data

  # Emulator container 1 (target server)
  # Runs both emulator (8080) and agent simulator (8085)
  emulator-1:
    build:
      context: ./emulator
      dockerfile: Dockerfile
    container_name: e2e-emulator-1
    hostname: emulator-1
    environment:
      EMULATOR_PORT: 8080
      EMULATOR_ID: 1
      AGENT_PORT: 8085
    ports:
      - "8081:8080"   # Emulator API
      - "8085:8085"   # Agent API
    networks:
      e2e-network:
        ipv4_address: 172.30.0.10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  # Emulator container 2 (target server)
  # Runs both emulator (8080) and agent simulator (8086)
  emulator-2:
    build:
      context: ./emulator
      dockerfile: Dockerfile
    container_name: e2e-emulator-2
    hostname: emulator-2
    environment:
      EMULATOR_PORT: 8080
      EMULATOR_ID: 2
      AGENT_PORT: 8086
    ports:
      - "8082:8080"   # Emulator API
      - "8086:8086"   # Agent API
    networks:
      e2e-network:
        ipv4_address: 172.30.0.11
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  # Load generator container (JMeter)
  loadgen-1:
    build:
      context: ./loadgen
      dockerfile: Dockerfile
    container_name: e2e-loadgen-1
    hostname: loadgen-1
    environment:
      LOADGEN_PORT: 8090
      LOADGEN_ID: 1
    ports:
      - "8090:8090"
    networks:
      e2e-network:
        ipv4_address: 172.30.0.20
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      emulator-1:
        condition: service_healthy
      emulator-2:
        condition: service_healthy

volumes:
  postgres-e2e-data:
