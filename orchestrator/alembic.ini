[alembic]
script_location = migrations
prepend_sys_path = src
# Default URL — override via ORCHESTRATOR_DB_URL env var or orchestrator.yaml
# PostgreSQL:  postgresql://orchestrator:orchestrator@localhost:5432/orchestrator
# SQL Server:  mssql+pyodbc://@localhost/orchestrator?driver=ODBC+Driver+17+for+SQL+Server&trusted_connection=yes
sqlalchemy.url = postgresql://orchestrator:orchestrator@localhost:5432/orchestrator

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
